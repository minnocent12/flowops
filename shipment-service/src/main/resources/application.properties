server.port=8084
spring.application.name=shipment-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flowops}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flowops}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flowops123}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
order.service.url=${ORDER_SERVICE_URL:http://localhost:8081}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
