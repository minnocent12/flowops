services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: flowops-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: flowops-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flowops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: flowops-db
    environment:
      POSTGRES_USER: flowops
      POSTGRES_PASSWORD: flowops123
      POSTGRES_DB: flowops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./resources/db/order-schema.sql:/docker-entrypoint-initdb.d/01-order-schema.sql
      - ./resources/db/inventory-schema.sql:/docker-entrypoint-initdb.d/02-inventory-schema.sql
      - ./resources/db/shipment-schema.sql:/docker-entrypoint-initdb.d/03-shipment-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowops"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./order-service
    container_name: flowops-order
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flowops
      SPRING_DATASOURCE_USERNAME: flowops
      SPRING_DATASOURCE_PASSWORD: flowops123
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory-service:
    build: ./inventory-service
    container_name: flowops-inventory
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flowops
      SPRING_DATASOURCE_USERNAME: flowops
      SPRING_DATASOURCE_PASSWORD: flowops123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  warehouse-service:
    build: ./warehouse-service
    container_name: flowops-warehouse
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flowops
      SPRING_DATASOURCE_USERNAME: flowops
      SPRING_DATASOURCE_PASSWORD: flowops123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INVENTORY_SERVICE_URL: http://inventory-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  shipment-service:
    build: ./shipment-service
    container_name: flowops-shipment
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flowops
      SPRING_DATASOURCE_USERNAME: flowops
      SPRING_DATASOURCE_PASSWORD: flowops123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
