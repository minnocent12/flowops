server.port=8081
spring.application.name=order-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flowops}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flowops}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flowops123}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Inventory service
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8082}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Logging
logging.pattern.console=%d{HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n
