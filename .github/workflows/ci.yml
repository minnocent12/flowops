name: FlowOps CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-order-service:
    name: Order Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: ./order-service
        run: mvn test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-results
          path: order-service/target/surefire-reports/

  test-warehouse-service:
    name: Warehouse Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: ./warehouse-service
        run: mvn test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warehouse-service-test-results
          path: warehouse-service/target/surefire-reports/

  test-inventory-service:
    name: Inventory Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: ./inventory-service
        run: mvn test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-service-test-results
          path: inventory-service/target/surefire-reports/

  test-shipment-service:
    name: Shipment Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: ./shipment-service
        run: mvn test -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shipment-service-test-results
          path: shipment-service/target/surefire-reports/

  build-all:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: [ test-order-service, test-inventory-service, test-warehouse-service, test-shipment-service ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build order-service
        working-directory: ./order-service
        run: mvn clean package -DskipTests -B

      - name: Build inventory-service
        working-directory: ./inventory-service
        run: mvn clean package -DskipTests -B

      - name: Build warehouse-service
        working-directory: ./warehouse-service
        run: mvn clean package -DskipTests -B

      - name: Build shipment-service
        working-directory: ./shipment-service
        run: mvn clean package -DskipTests -B

      - name: All services built successfully
        run: echo "FlowOps build complete — all 4 services passed"
